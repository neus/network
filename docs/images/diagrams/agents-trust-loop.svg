<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none" role="img" aria-labelledby="agentsFlowTitle agentsFlowDesc">
  <title id="agentsFlowTitle">Agent registration and delegation</title>
  <desc id="agentsFlowDesc">Register agent identity, delegate scope from controller, then act with proof receipts.</desc>
  <defs>
    <linearGradient id="ag-canvas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121418"/>
      <stop offset="100%" stop-color="#0c0d10"/>
    </linearGradient>
    <linearGradient id="ag-panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="ag-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(152,192,239,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <filter id="ag-shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="400" height="320" rx="18" fill="url(#ag-canvas)"/>
  <rect x="14" y="14" width="372" height="292" rx="16" fill="url(#ag-panel)" stroke="rgba(255,255,255,0.06)" stroke-width="1" filter="url(#ag-shadow)"/>
  <text x="200" y="42" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="0.12em" fill="rgba(255,255,255,0.45)">AGENT TRUST LOOP</text>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="72" y="58" width="256" height="68" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="200" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">Agent registers</text>
    <text x="200" y="108" text-anchor="middle" font-size="10.5" font-weight="600" fill="#98C0EF">agent-identity</text>
    <rect x="72" y="154" width="256" height="76" rx="12" fill="url(#ag-accent)" stroke="rgba(152,192,239,0.28)" stroke-width="1"/>
    <text x="200" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">Controller delegates scope</text>
    <text x="200" y="204" text-anchor="middle" font-size="10.5" font-weight="600" fill="#98C0EF">agent-delegation</text>
    <rect x="72" y="250" width="256" height="52" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="200" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">Agent acts with proof receipt</text>
  </g>
  <!-- Vertical arrows -->
  <line x1="200" y1="128" x2="200" y2="148" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="200,154 195,146 205,146" fill="rgba(255,255,255,0.45)"/>
  <line x1="200" y1="232" x2="200" y2="244" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="200,250 195,242 205,242" fill="rgba(255,255,255,0.45)"/>
</svg>
