<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 292" fill="none" role="img" aria-labelledby="platformFlowTitle platformFlowDesc">
  <title id="platformFlowTitle">NEUS platform flow</title>
  <desc id="platformFlowDesc">Hosted verify leads to Proof API and proof pages; hub and your app consume the same receipts.</desc>
  <defs>
    <linearGradient id="pf-canvas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121418"/>
      <stop offset="100%" stop-color="#0c0d10"/>
    </linearGradient>
    <linearGradient id="pf-panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="pf-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(152,192,239,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="pf-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="720" height="292" rx="18" fill="url(#pf-canvas)"/>
  <rect x="12" y="12" width="696" height="268" rx="16" fill="url(#pf-panel)" stroke="rgba(255,255,255,0.06)" stroke-width="1" filter="url(#pf-shadow)"/>
  <text x="360" y="44" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em" fill="rgba(255,255,255,0.45)">NEUS PLATFORM</text>
  <!-- Row nodes -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="58" y="64" width="152" height="76" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="134" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">/verify</text>
    <text x="134" y="116" text-anchor="middle" font-size="10.5" font-weight="600" fill="rgba(255,255,255,0.62)">(hosted)</text>
    <rect x="284" y="64" width="152" height="76" rx="12" fill="url(#pf-accent)" stroke="rgba(152,192,239,0.35)" stroke-width="1"/>
    <text x="360" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#98C0EF">Proof API</text>
    <text x="360" y="116" text-anchor="middle" font-size="10.5" font-weight="600" fill="rgba(255,255,255,0.85)">(create)</text>
    <rect x="510" y="64" width="152" height="76" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="586" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">/proof/[id]</text>
    <text x="586" y="116" text-anchor="middle" font-size="10.5" font-weight="600" fill="rgba(255,255,255,0.62)">(display)</text>
  </g>
  <!-- Horizontal arrows -->
  <path d="M214 102h62" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="276,102 268,97 268,107" fill="rgba(255,255,255,0.45)"/>
  <path d="M440 102h62" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="502,102 494,97 494,107" fill="rgba(255,255,255,0.45)"/>
  <!-- Down connectors -->
  <line x1="134" y1="140" x2="134" y2="174" stroke="rgba(255,255,255,0.32)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="586" y1="140" x2="586" y2="174" stroke="rgba(255,255,255,0.32)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bottom nodes -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="58" y="180" width="152" height="76" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="134" y="212" text-anchor="middle" font-size="12.5" font-weight="700" fill="#e2e8f0">Platform</text>
    <text x="134" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="rgba(255,255,255,0.72)">/hub</text>
    <rect x="510" y="180" width="152" height="76" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="586" y="210" text-anchor="middle" font-size="12.5" font-weight="700" fill="#f8fafc">Your app</text>
    <text x="586" y="232" text-anchor="middle" font-size="10.5" font-weight="600" fill="rgba(255,255,255,0.62)">(reuse proofs)</text>
  </g>
  <polygon points="134,180 128,172 140,172" fill="rgba(255,255,255,0.42)"/>
  <polygon points="586,180 580,172 592,172" fill="rgba(255,255,255,0.42)"/>
</svg>
