name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - ".gitbook.yaml"
      - ".markdownlint-cli2.jsonc"
      - "sdk/**/*.md"
      - "examples/**/*.md"
      - "README.md"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".gitbook.yaml"
      - ".markdownlint-cli2.jsonc"
      - "sdk/**/*.md"
      - "examples/**/*.md"
      - "README.md"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.19.0

jobs:
  docs:
    name: Docs (markdown + OpenAPI validation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Markdown lint
        run: npx --yes markdownlint-cli2@latest --config .markdownlint-cli2.jsonc

      - name: OpenAPI lint (public surface)
        run: npx --yes @redocly/cli@2.14.1 lint docs/api/public-api.json

