name: Docs

on:
  pull_request:
    paths:
      - 'package.json'
      - 'README.md'
      - 'SECURITY.md'
      - 'CONTRIBUTING.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'sdk/**/*.md'
      - 'examples/**/*.md'
      - 'scripts/**/*.mjs'
      - 'spec/verifiers/**/*'
      - 'docs/**/*'
      - 'mint.json'
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'README.md'
      - 'SECURITY.md'
      - 'CONTRIBUTING.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'sdk/**/*.md'
      - 'examples/**/*.md'
      - 'scripts/**/*.mjs'
      - 'spec/verifiers/**/*'
      - 'docs/**/*'
      - 'mint.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  docs:
    name: Docs validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Docs validation
        run: npm run docs:validate
