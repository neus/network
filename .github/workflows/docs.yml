name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - ".gitbook.yaml"
      - ".markdownlint-cli2.jsonc"
      - "sdk/**/*.md"
      - "examples/**/*.md"
      - "README.md"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".gitbook.yaml"
      - ".markdownlint-cli2.jsonc"
      - "sdk/**/*.md"
      - "examples/**/*.md"
      - "README.md"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.19.0

jobs:
  docs:
    name: Docs (markdown + OpenAPI validation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch origin ${{ github.sha }}
          git checkout ${{ github.sha }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        run: |
          NODE_VERSION="${{ env.NODE_VERSION }}"
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install "$NODE_VERSION"
          nvm use "$NODE_VERSION"
          echo "PATH=$HOME/.nvm/versions/node/v$NODE_VERSION/bin:$PATH" >> $GITHUB_PATH
          node --version
          npm --version

      - name: Markdown lint
        run: npx --yes markdownlint-cli2@latest --config .markdownlint-cli2.jsonc

      - name: OpenAPI lint (public surface)
        run: npx --yes @redocly/cli@2.14.1 lint docs/api/public-api.json

