name: Docs

on:
  pull_request:
    paths:
      - 'README.md'
      - 'SECURITY.md'
      - 'CONTRIBUTING.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs.yml'
      - 'sdk/**/*.md'
      - 'examples/**/*.md'
      - 'scripts/generate-docs-manifest.mjs'
      - 'mintlify/**/*'
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'SECURITY.md'
      - 'CONTRIBUTING.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs.yml'
      - 'sdk/**/*.md'
      - 'examples/**/*.md'
      - 'scripts/generate-docs-manifest.mjs'
      - 'mintlify/**/*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  docs:
    name: Docs validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Markdown lint
        run: npx --yes markdownlint-cli2@latest --config .markdownlint-cli2.jsonc

      - name: OpenAPI lint (public surface)
        run: npx --yes @redocly/cli@2.14.1 lint mintlify/openapi/public-api.json
