name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # required for npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20.19.0
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  publish_sdk:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && github.repository_owner == 'neus'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch origin tag ${{ github.ref_name }} --no-tags
          git checkout ${{ github.ref_name }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        run: |
          NODE_VERSION="${{ env.NODE_VERSION }}"
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install "$NODE_VERSION"
          nvm use "$NODE_VERSION"
          echo "PATH=$HOME/.nvm/versions/node/v$NODE_VERSION/bin:$PATH" >> $GITHUB_PATH
          node --version
          npm --version
        env:
          NPM_REGISTRY: ${{ env.NPM_REGISTRY }}

      # Ensure package.json version matches the tag (vX.Y.Z)
      - name: Verify version matches tag
        run: |
          node -e "const v=require('./sdk/package.json').version;const t=process.env.GITHUB_REF_NAME.replace(/^v/,'');if(v!==t){console.error(`package.json ${v} != tag ${t}`);process.exit(1)}"

      - name: Install dependencies
        run: npm ci
        working-directory: sdk

      - name: Lint
        run: npm run lint
        working-directory: sdk

      - name: Test
        run: npm test --silent
        working-directory: sdk

      - name: Production audit (high severity)
        run: npm audit --omit=dev --audit-level=high
        working-directory: sdk

      # Build before pack so dry-run matches the published tarball.
      - name: Build
        run: npm run build
        working-directory: sdk

      - name: Package check
        run: npm pack --dry-run
        working-directory: sdk

      - name: Configure npm authentication
        run: |
          rm -f ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          echo "registry=${{ env.NPM_REGISTRY }}" >> .npmrc
          echo "//registry.npmjs.org/:always-auth=true" >> .npmrc
          echo "Verifying npm authentication..."
          npm whoami --registry=${{ env.NPM_REGISTRY }} || (echo "ERROR: npm authentication failed. Configure the repository secret NPM_TOKEN for this workflow." && exit 1)
          echo "Authentication verified successfully"
        working-directory: sdk
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @neus/sdk
        run: |
          export NPM_CONFIG_USERCONFIG="$(pwd)/.npmrc"
          npm publish --access public --provenance
        working-directory: sdk
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
