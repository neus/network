name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # required for npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20.19.0
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  publish_sdk:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && github.repository_owner == 'neus'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          node scripts/verify-release-versions.mjs --tag "$TAG"
          node -e "const v=require('./sdk/package.json').version;const t=process.env.GITHUB_REF_NAME.replace(/^v/,'');if(v!==t){console.error(\`package.json ${v} != tag ${t}\`);process.exit(1)}"

      - name: Install dependencies
        run: npm ci
        working-directory: sdk

      - name: Lint
        run: npm run lint
        working-directory: sdk

      - name: Test
        run: npm test --silent
        working-directory: sdk

      - name: Production audit (high severity)
        run: npm audit --omit=dev --audit-level=high
        working-directory: sdk

      - name: Build
        run: npm run build
        working-directory: sdk

      - name: Package check
        run: npm pack --dry-run
        working-directory: sdk

      - name: Verify npm publish hygiene
        run: node scripts/verify-publish-hygiene.mjs

      - name: Publish @neus/sdk
        run: npm publish --access public --provenance
        working-directory: sdk

      - name: Verify @neus/mcp-server version matches tag
        run: |
          node -e "const v=require('./mcp/npm-dist/package.json').version;const t=process.env.GITHUB_REF_NAME.replace(/^v/,'');if(v!==t){console.error(\`mcp/npm-dist ${v} != tag ${t}\`);process.exit(1)}"

      - name: Package check (@neus/mcp-server)
        run: npm pack --dry-run
        working-directory: mcp/npm-dist

      - name: Publish @neus/mcp-server
        run: npm publish --access public --provenance
        working-directory: mcp/npm-dist
