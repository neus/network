name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.1.3)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write   # npm Trusted Publishing (OIDC)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Node 24 ships npm 11.16.0 — meets the npm >= 11.5.1 requirement for OIDC trusted publishing.
  # Node 20 (npm 10.x) does NOT support OIDC and causes ENEEDAUTH / silent publish failures.
  NODE_VERSION: '24'
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  publish_sdk:
    if: (github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && github.repository_owner == 'neus') || (github.event_name == 'workflow_dispatch' && github.repository_owner == 'neus')
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      # NOTE: NODE_AUTH_TOKEN is intentionally NOT set here. npm OIDC trusted publishing
      # uses the GitHub Actions OIDC token (granted via id-token: write) instead of a
      # long-lived npm token. Setting NODE_AUTH_TOKEN — even to an empty string — makes
      # npm attempt token auth and never initiate the OIDC exchange, causing ENEEDAUTH.
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref_name }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}
          # registry-url writes an empty _authToken line to .npmrc that breaks OIDC
          # (actions/setup-node issue #1551). We strip it before each publish step below.

      - name: Verify all version surfaces match tag
        run: node scripts/verify-release-versions.mjs "${RELEASE_VERSION}"

      - name: Install dependencies
        run: npm ci
        working-directory: sdk

      - name: Lint
        run: npm run lint
        working-directory: sdk

      - name: Test
        run: npm test --silent
        working-directory: sdk

      - name: Production audit (high severity)
        run: npm audit --omit=dev --audit-level=high
        working-directory: sdk

      - name: Build
        run: npm run build
        working-directory: sdk

      - name: Package check
        run: npm pack --dry-run
        working-directory: sdk

      - name: Publish @neus/sdk
        run: |
          VERSION="${RELEASE_VERSION#v}"
          if npm view "@neus/sdk@$VERSION" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "@neus/sdk@$VERSION already published; skipping"
          else
            # Strip the empty _authToken line that setup-node writes (issue #1551).
            # Without this, npm sees _authToken= (empty) and skips the OIDC exchange.
            npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
            sed -i '/_authToken/d' "$npmrc" 2>/dev/null || true
            npm publish --access public --provenance --registry https://registry.npmjs.org
          fi
        working-directory: sdk

      - name: Verify @neus/mcp-server version matches tag
        run: node scripts/verify-release-versions.mjs "${RELEASE_VERSION}"

      - name: Package check (@neus/mcp-server)
        run: npm pack --dry-run
        working-directory: mcp/npm-dist

      - name: Publish @neus/mcp-server
        run: |
          VERSION="${RELEASE_VERSION#v}"
          if npm view "@neus/mcp-server@$VERSION" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "@neus/mcp-server@$VERSION already published; skipping"
          else
            npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
            sed -i '/_authToken/d' "$npmrc" 2>/dev/null || true
            npm publish --access public --provenance --registry https://registry.npmjs.org
          fi
        working-directory: mcp/npm-dist

      # Create/update the GitHub Release for this version. Latest follows npm latest.
      - name: Create or update GitHub Release
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION#v}"
          TAG="v${VERSION}"
          NOTES_FILE="$(mktemp)"
          node scripts/extract-changelog-notes.mjs "${VERSION}" > "${NOTES_FILE}"
          NPM_LATEST="$(npm view @neus/sdk version --registry https://registry.npmjs.org)"
          LATEST_ARGS=()
          if [ "${VERSION}" = "${NPM_LATEST}" ]; then
            LATEST_ARGS=(--latest)
          else
            LATEST_ARGS=(--latest=false)
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --notes-file "${NOTES_FILE}" "${LATEST_ARGS[@]}"
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes-file "${NOTES_FILE}" \
              "${LATEST_ARGS[@]}"
          fi
          echo "GitHub Release ${TAG} ready"
