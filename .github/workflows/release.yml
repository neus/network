name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.1.3)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20.19.0
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  publish_sdk:
    if: (github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && github.repository_owner == 'neus') || (github.event_name == 'workflow_dispatch' && github.repository_owner == 'neus')
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref_name }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Verify version matches tag
        run: |
          TAG="${RELEASE_VERSION#v}"
          node -e "
          const fs=require('fs');
          const t=process.env.RELEASE_VERSION.replace(/^v/,'');
          const read=(p)=>JSON.parse(fs.readFileSync(p,'utf8'));
          const surfaces={
            'sdk/package.json': read('sdk/package.json').version,
            'sdk/package-lock.json': read('sdk/package-lock.json').version,
            'mcp/npm-dist/package.json': read('mcp/npm-dist/package.json').version,
            'mcp/npm-dist/server.json': read('mcp/npm-dist/server.json').version,
            'plugins/neus-trust/.cursor-plugin/plugin.json': read('plugins/neus-trust/.cursor-plugin/plugin.json').version,
            '.cursor-plugin/marketplace.json': read('.cursor-plugin/marketplace.json').plugins[0].version,
            'plugins/neus-trust/skills/neus-trust-workflow/SKILL.md': (read('plugins/neus-trust/skills/neus-trust-workflow/SKILL.md').match(/^version:\s*"([^"]+)"$/m)||[])[1],
          };
          const bad=Object.entries(surfaces).filter(([,v])=>v!==t);
          if(bad.length){console.error('Version mismatch:',bad);process.exit(1)}
          "

      - name: Install dependencies
        run: npm ci
        working-directory: sdk

      - name: Lint
        run: npm run lint
        working-directory: sdk

      - name: Test
        run: npm test --silent
        working-directory: sdk

      - name: Production audit (high severity)
        run: npm audit --omit=dev --audit-level=high
        working-directory: sdk

      - name: Build
        run: npm run build
        working-directory: sdk

      - name: Package check
        run: npm pack --dry-run
        working-directory: sdk

      - name: Publish @neus/sdk
        run: |
          VERSION="${RELEASE_VERSION#v}"
          if npm view "@neus/sdk@$VERSION" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "@neus/sdk@$VERSION already published; skipping"
          else
            npm publish --access public --provenance --registry https://registry.npmjs.org
          fi
        working-directory: sdk

      - name: Verify @neus/mcp-server version matches tag
        run: |
          node -e "const v=require('./mcp/npm-dist/package.json').version;const t=process.env.RELEASE_VERSION.replace(/^v/,'');if(v!==t){console.error(\`mcp/npm-dist ${v} != tag ${t}\`);process.exit(1)}"

      - name: Package check (@neus/mcp-server)
        run: npm pack --dry-run
        working-directory: mcp/npm-dist

      - name: Publish @neus/mcp-server
        run: |
          VERSION="${RELEASE_VERSION#v}"
          if npm view "@neus/mcp-server@$VERSION" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "@neus/mcp-server@$VERSION already published; skipping"
          else
            npm publish --access public --provenance --registry https://registry.npmjs.org
          fi
        working-directory: mcp/npm-dist
