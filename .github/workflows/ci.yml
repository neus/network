name: CI

on:
  pull_request:
    paths:
      - "sdk/**"
      - "mcp/npm-dist/**"
      - "plugins/**"
      - ".cursor-plugin/**"
      - ".claude-plugin/**"
      - ".agents/**"
      - "examples/**"
      - "spec/VERIFIERS.json"
      - "docs/verifiers/schemas/**"
      - "docs/install.mdx"
      - "mcp/README.md"
      - "README.md"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "mcp/npm-dist/**"
      - "plugins/**"
      - ".cursor-plugin/**"
      - ".claude-plugin/**"
      - ".agents/**"
      - "examples/**"
      - "spec/VERIFIERS.json"
      - "docs/verifiers/schemas/**"
      - "docs/install.mdx"
      - "mcp/README.md"
      - "README.md"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep aligned with release.yml. Release uses Node 24 for npm 11 OIDC support;
  # CI must run the same version to catch incompatibilities before release.
  NODE_VERSION: '24'

jobs:
  sdk:
    name: SDK (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sdk

      - name: Lint
        run: npm run lint
        working-directory: sdk

      - name: Test
        run: npm test --silent
        working-directory: sdk

      - name: Build
        run: npm run build
        working-directory: sdk

      - name: Security audit (high severity)
        run: npm audit --omit=dev --audit-level=high
        working-directory: sdk

      - name: Package check
        run: npm pack --dry-run
        working-directory: sdk

      - name: Package check (@neus/mcp-server)
        run: npm pack --dry-run
        working-directory: mcp/npm-dist

  plugin-template:
    name: Plugin manifests (Cursor, Claude Code, Codex)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate marketplace + plugin manifests
        run: |
          node scripts/validate-template.mjs
          node scripts/validate-cursor-schemas.mjs
          node scripts/validate-universal-manifests.mjs
