name: CI

on:
  pull_request:
    paths:
      - "sdk/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.19.0

jobs:
  sdk:
    name: SDK (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch origin ${{ github.sha }}
          git checkout ${{ github.sha }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        run: |
          NODE_VERSION="${{ env.NODE_VERSION }}"
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm install "$NODE_VERSION"
          nvm use "$NODE_VERSION"
          echo "PATH=$HOME/.nvm/versions/node/v$NODE_VERSION/bin:$PATH" >> $GITHUB_PATH
          node --version
          npm --version

      - name: Install dependencies
        run: if [ -f package-lock.json ]; then npm ci; else npm install; fi
        working-directory: sdk

      - name: Lint
        run: npm run lint
        working-directory: sdk

      - name: Test
        run: npm test --silent
        working-directory: sdk

      - name: Build
        run: npm run build
        working-directory: sdk

      - name: Security audit (high severity)
        run: npm audit --omit=dev --audit-level=high
        working-directory: sdk

      - name: Package check
        run: npm pack --dry-run
        working-directory: sdk
